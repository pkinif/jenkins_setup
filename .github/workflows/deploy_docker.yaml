name: Build and Push Docker image

on:
  push:
    branches:
      - main  # ou master si ton repo est en master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build date (UTC)
        id: date
        run: echo "date=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            pierrickkinif/jenkins:latest
            pierrickkinif/jenkins:${{ github.ref_name }}-${{ github.run_number }}
            pierrickkinif/jenkins:sha-${{ github.sha }}
          build-args: |
            BUILD_DATE=${{ steps.date.outputs.date }}
            VCS_REF=${{ github.sha }}
            CI_WORKFLOW=${{ github.workflow }}
            IMAGE_TAG=${{ github.ref_name }}-${{ github.run_number }}
